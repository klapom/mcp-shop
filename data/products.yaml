# Produkt-Katalog — Source of Truth (ADR-017)
#
# Verkaufbare SKUs. V1 = eins pro Namespace, keine Bundles.
# Bundles werden später additiv angelegt, ohne dass bestehende IDs/Slugs geändert werden.
#
# Wird von `gateway admin catalog sync <path>` eingelesen.
#
# Schema:
#   id:                    uuid4 — einmal generiert, NIE ändern (Stripe-Kopplung)
#   slug:                  URL-safe Kurzname, einmalig, neutral (= Namespace-ID V1)
#   display_name:          Shop-Titel — wird von Sales/Marketing-Persona gepflegt, initial Platzhalter
#   scopes:                list[{namespace, scope}] — Scope-Paare, M:N
#   trial_days:            int | null — Trial-Dauer ab first-use
#   stripe_product_id:     Stripe-Anbindung, gesetzt vom Shop-Sync
#   status:                "active" | "deprecated" | "draft"
#
# Marketing-Block (Sales/Marketing-Persona-gepflegt, bis dahin leer):
#   marketing:
#     tagline:             1 Satz, unter 80 Zeichen
#     description_long:    Markdown-Langtext für Product-Detail-Page
#     use_cases:           list[str]
#     icon_url:             URL (CDN/static)
#     screenshots:         list[{url, caption}]
#     pricing_note:        optionaler Zusatz unter Preis
#     category:            frei gepflegt
#
# Build-Tooling (Sprint 9): fehlende marketing-Felder → Placeholder oder "coming-soon"-Liste.


# mcp-shop — static Astro build
# Port: 34400 (34xxx = Web-Apps/Frontends, ADR-016)
# Hostname: shop.pommerconsulting.de → CF Tunnel → localhost:34400
# Deploy: rsync dist/ to /var/www/mcp-shop/

server {
    listen 34400;
    server_name _;
    root /var/www/mcp-shop;
    index index.html;

    access_log /var/log/nginx/mcp-shop.log;
    error_log  /var/log/nginx/mcp-shop.error.log;

    # Static assets — long cache (Astro hashes filenames)
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML pages — short cache (content changes on deploy)
    location / {
        try_files $uri $uri/ $uri.html /index.html =404;
        add_header Cache-Control "public, max-age=300";
    }

    # Sitemap + robots — no cache
    location ~* \.(xml|txt)$ {
        expires 0;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
